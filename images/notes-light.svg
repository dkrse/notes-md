<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded square background - solid blue -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#4a90d9"/>
  <!-- Paper -->
  <rect x="28" y="16" width="72" height="96" rx="6" fill="#ffffff"/>
  <!-- Folded corner -->
  <path d="M82 16 L100 16 L100 34 Z" fill="#dce6f0"/>
  <path d="M82 16 L82 34 L100 34 Z" fill="#c8d8e8"/>
  <!-- Line numbers gutter -->
  <rect x="28" y="16" width="16" height="96" rx="6" fill="#eef2f7"/>
  <rect x="38" y="16" width="6" height="96" fill="#eef2f7"/>
  <text x="39" y="42" font-family="sans-serif" font-size="8" fill="#8899aa" text-anchor="end">1</text>
  <text x="39" y="53" font-family="sans-serif" font-size="8" fill="#8899aa" text-anchor="end">2</text>
  <text x="39" y="64" font-family="sans-serif" font-size="8" fill="#8899aa" text-anchor="end">3</text>
  <text x="39" y="75" font-family="sans-serif" font-size="8" fill="#8899aa" text-anchor="end">4</text>
  <text x="39" y="86" font-family="sans-serif" font-size="8" fill="#8899aa" text-anchor="end">5</text>
  <text x="39" y="97" font-family="sans-serif" font-size="8" fill="#8899aa" text-anchor="end">6</text>
  <!-- Current line highlight -->
  <rect x="28" y="33" width="72" height="12" fill="#4a90d9" opacity="0.08"/>
  <!-- Text lines -->
  <rect x="46" y="37" width="40" height="3" rx="1.5" fill="#2c3e50" opacity="0.75"/>
  <rect x="46" y="48" width="32" height="3" rx="1.5" fill="#2c3e50" opacity="0.50"/>
  <rect x="46" y="59" width="46" height="3" rx="1.5" fill="#2c3e50" opacity="0.75"/>
  <rect x="46" y="70" width="26" height="3" rx="1.5" fill="#2c3e50" opacity="0.50"/>
  <rect x="46" y="81" width="38" height="3" rx="1.5" fill="#2c3e50" opacity="0.75"/>
  <rect x="46" y="92" width="30" height="3" rx="1.5" fill="#2c3e50" opacity="0.45"/>
  <!-- Text cursor -->
  <rect x="86" y="35" width="2" height="10" rx="1" fill="#4a90d9"/>
  <!-- Pencil -->
  <g transform="translate(88,74) rotate(35)">
    <rect x="0" y="0" width="5.5" height="30" rx="1" fill="#f5c842"/>
    <rect x="0" y="0" width="5.5" height="5" rx="1" fill="#e0a020"/>
    <polygon points="0.5,30 5,30 2.75,36" fill="#555"/>
    <rect x="0" y="24" width="5.5" height="3" fill="#f0a0a0"/>
  </g>
</svg>
