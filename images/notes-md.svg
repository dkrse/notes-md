<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded square background - green gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fb27f"/>
      <stop offset="1" stop-color="#2a8f5f"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Paper -->
  <rect x="24" y="16" width="80" height="96" rx="6" fill="#ffffff"/>
  <!-- Folded corner -->
  <path d="M86 16 L104 16 L104 34 Z" fill="#d4ece0"/>
  <path d="M86 16 L86 34 L104 34 Z" fill="#bddfcf"/>
  <!-- Heading bar -->
  <rect x="32" y="30" width="44" height="5" rx="2" fill="#2a8f5f"/>
  <rect x="32" y="41" width="60" height="3" rx="1.5" fill="#2c3e50" opacity="0.55"/>
  <rect x="32" y="48" width="52" height="3" rx="1.5" fill="#2c3e50" opacity="0.55"/>
  <rect x="32" y="55" width="56" height="3" rx="1.5" fill="#2c3e50" opacity="0.55"/>
  <!-- Code block -->
  <rect x="32" y="64" width="64" height="16" rx="3" fill="#e8f3ec"/>
  <rect x="36" y="68" width="30" height="2.5" rx="1" fill="#2a8f5f" opacity="0.8"/>
  <rect x="36" y="73" width="40" height="2.5" rx="1" fill="#2a8f5f" opacity="0.6"/>
  <!-- Math expression -->
  <text x="36" y="96" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#2a8f5f">∑ </text>
  <text x="46" y="96" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2c3e50">a=bc²</text>
  <!-- MD badge -->
  <rect x="74" y="92" width="24" height="14" rx="3" fill="#2a8f5f"/>
  <text x="86" y="102" font-family="sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">MD</text>
</svg>
